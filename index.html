<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>LLENO / VACÍO</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      --ink: #1f2933;
      --line: #343a40;
      --ok: #1f8f4d;
      --bad: #c0392b;
      --soft: #f4f5f7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #fff;
      color: var(--ink);
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 8px;
      -webkit-user-select: none;
      user-select: none;
    }

    .topbar,
    .tray,
    .final-screen {
      width: min(100%, 1120px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 34px;
      font-size: clamp(13px, 2vw, 16px);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 14px;
    }

    .feedback {
      min-width: 7.5em;
      text-align: right;
      font-weight: 700;
    }

    .feedback.ok {
      color: var(--ok);
    }

    .feedback.bad {
      color: var(--bad);
    }

    .page-wrap {
      position: relative;
      width: min(100%, 1120px, calc((100svh - 152px) * 1.414));
      max-height: calc(100svh - 152px);
      aspect-ratio: 1685 / 1191;
      touch-action: none;
    }

    .page-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .drop-zone {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      border: 0;
      background: transparent;
      pointer-events: none;
    }

    .drop-zone.correct {
      outline: 4px solid rgba(31, 143, 77, 0.85);
      outline-offset: -4px;
    }

    .placed-card {
      position: absolute;
      display: grid;
      place-items: center;
      border: 4px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-size: clamp(20px, 3.6vw, 40px);
      font-weight: 800;
      letter-spacing: 0;
      pointer-events: none;
    }

    .tray {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 76px;
      touch-action: none;
    }

    .tray.passive .card {
      display: none;
    }

    .card {
      width: min(34vw, 190px);
      height: 64px;
      display: grid;
      place-items: center;
      border: 3px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 800;
      letter-spacing: 0;
      cursor: grab;
      touch-action: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .card:active {
      cursor: grabbing;
    }

    .card.dragging {
      position: fixed;
      z-index: 20;
      width: var(--drag-width);
      height: var(--drag-height);
      margin: 0;
      pointer-events: none;
      cursor: grabbing;
    }

    .card.used {
      visibility: hidden;
      pointer-events: none;
    }

    .card.error {
      border-color: var(--bad);
    }

    .next-button,
    .restart-button {
      min-height: 44px;
      border: 2px solid var(--line);
      background: var(--soft);
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      padding: 0 18px;
      cursor: pointer;
    }

    .next-button[data-locked="true"] {
      opacity: 0.45;
      cursor: pointer;
    }

    .final-screen {
      display: none;
      min-height: 60svh;
      place-items: center;
      text-align: center;
    }

    .final-screen.active {
      display: grid;
    }

    .final-box {
      width: min(100%, 520px);
      border: 2px solid var(--line);
      padding: 28px;
      background: #fff;
    }

    .final-box h1 {
      margin: 0 0 18px;
      font-size: clamp(28px, 7vw, 44px);
      letter-spacing: 0;
    }

    .final-box p {
      margin: 10px 0;
      font-size: clamp(18px, 4vw, 24px);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      body {
        padding: 6px;
        gap: 6px;
      }

      .topbar {
        align-items: flex-start;
      }

      .stats {
        gap: 4px 10px;
      }

      .page-wrap {
        width: min(100%, calc((100svh - 166px) * 1.414));
        max-height: calc(100svh - 166px);
      }

      .tray {
        min-height: 68px;
        gap: 8px;
      }

      .card {
        height: 58px;
      }

      .next-button {
        min-width: 92px;
        padding: 0 12px;
      }
    }
  </style>
</head>
<body>
  <main id="activity">
    <section class="topbar" aria-label="Progreso">
      <div class="stats">
        <span id="pageCounter">Página 1/12</span>
        <span>Aciertos: <strong id="scoreOk">0</strong></span>
        <span>Errores: <strong id="scoreBad">0</strong></span>
        <span>Intentos: <strong id="scoreAttempts">0</strong></span>
        <span>Precisión: <strong id="scoreAccuracy">0%</strong></span>
        <span>Tiempo medio: <strong id="scoreAvgResponse">0.0s</strong></span>
        <span>Página: <strong id="scorePageTime">0.0s</strong></span>
      </div>
      <div id="feedback" class="feedback" aria-live="polite"></div>
    </section>

    <section id="pageWrap" class="page-wrap" aria-label="Página del cuaderno">
      <img id="pageImage" class="page-image" alt="Página del cuaderno LLENO VACÍO">
      <div class="drop-zone" data-zone="left" style="--x: 14.2%; --y: 58.2%; --w: 22.8%; --h: 32.4%;"></div>
      <div class="drop-zone" data-zone="right" style="--x: 62.9%; --y: 58.2%; --w: 22.8%; --h: 32.4%;"></div>
    </section>

    <section id="tray" class="tray" aria-label="Tarjetas">
      <div class="card" role="button" tabindex="0" data-card="LLENO">LLENO</div>
      <div class="card" role="button" tabindex="0" data-card="VACÍO">VACÍO</div>
      <button id="nextButton" class="next-button" type="button">Siguiente</button>
    </section>
  </main>

  <section id="finalScreen" class="final-screen" aria-live="polite">
    <div class="final-box">
      <h1>Resultado</h1>
      <p>Aciertos: <strong id="finalOk">0</strong></p>
      <p>Errores: <strong id="finalBad">0</strong></p>
      <p>Porcentaje: <strong id="finalPercent">0%</strong></p>
      <p>Tiempo: <strong id="finalTime">0:00</strong></p>
      <p>Tiempo medio de respuesta: <strong id="finalAvgResponse">0.0s</strong></p>
      <p>Precisión al primer intento: <strong id="finalFirstTry">0%</strong></p>
      <p>Errores por objetivo: <strong id="finalErrorLoad">0.0</strong></p>
      <p>Tiempo medio por página: <strong id="finalAvgPage">0.0s</strong></p>
      <button id="restartButton" class="restart-button" type="button">Reiniciar</button>
    </div>
  </section>

  <script>
    const pages = [
      { page: 1, image: "assets/pages/page-01.png" },
      { page: 2, image: "assets/pages/page-02.png", answers: { left: "LLENO", right: "VACÍO" } },
      { page: 3, image: "assets/pages/page-03.png", answers: { left: "VACÍO", right: "LLENO" } },
      { page: 4, image: "assets/pages/page-04.png", answers: { left: "LLENO", right: "VACÍO" } },
      { page: 5, image: "assets/pages/page-05.png", answers: { left: "VACÍO", right: "LLENO" } },
      { page: 6, image: "assets/pages/page-06.png", answers: { left: "LLENO", right: "VACÍO" } },
      { page: 7, image: "assets/pages/page-07.png", answers: { left: "VACÍO", right: "LLENO" } },
      { page: 8, image: "assets/pages/page-08.png", answers: { left: "LLENO", right: "VACÍO" } },
      { page: 9, image: "assets/pages/page-09.png", answers: { left: "VACÍO", right: "LLENO" } },
      { page: 10, image: "assets/pages/page-10.png" },
      { page: 11, image: "assets/pages/page-11.png" },
      { page: 12, image: "assets/pages/page-12.png" }
    ];
    const interactiveTargetCount = pages.filter((page) => page.answers).length * 2;

    const state = {
      index: 0,
      ok: 0,
      bad: 0,
      attempts: 0,
      solved: {},
      startTime: Date.now(),
      drag: null,
      pageStartedAt: Date.now(),
      targetStartedAt: Date.now(),
      currentTargetErrors: 0,
      currentPageErrors: 0,
      responseTimes: [],
      pageTimes: [],
      firstTryHits: 0,
      pageSummaries: [],
      timerId: null
    };

    const activity = document.getElementById("activity");
    const finalScreen = document.getElementById("finalScreen");
    const pageWrap = document.getElementById("pageWrap");
    const pageImage = document.getElementById("pageImage");
    const pageCounter = document.getElementById("pageCounter");
    const tray = document.getElementById("tray");
    const scoreOk = document.getElementById("scoreOk");
    const scoreBad = document.getElementById("scoreBad");
    const scoreAttempts = document.getElementById("scoreAttempts");
    const scoreAccuracy = document.getElementById("scoreAccuracy");
    const scoreAvgResponse = document.getElementById("scoreAvgResponse");
    const scorePageTime = document.getElementById("scorePageTime");
    const feedback = document.getElementById("feedback");
    const nextButton = document.getElementById("nextButton");
    const restartButton = document.getElementById("restartButton");
    const cards = Array.from(document.querySelectorAll(".card"));
    const zones = Array.from(document.querySelectorAll(".drop-zone"));

    function normalize(value) {
      return value.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    }

    function average(values) {
      if (!values.length) return 0;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function formatSeconds(ms) {
      return `${(ms / 1000).toFixed(1)}s`;
    }

    function updateLiveTimers() {
      const current = pages[state.index];
      if (!current?.answers) {
        scorePageTime.textContent = "0.0s";
        return;
      }
      scorePageTime.textContent = formatSeconds(Date.now() - state.pageStartedAt);
    }

    function clearTimer() {
      if (state.timerId) {
        window.clearInterval(state.timerId);
        state.timerId = null;
      }
    }

    function startTimerIfNeeded() {
      clearTimer();
      if (!pages[state.index]?.answers) {
        scorePageTime.textContent = "0.0s";
        return;
      }
      updateLiveTimers();
      state.timerId = window.setInterval(updateLiveTimers, 200);
    }

    function renderPage() {
      const current = pages[state.index];
      const isInteractive = Boolean(current.answers);
      state.solved = {};
      state.pageStartedAt = Date.now();
      state.targetStartedAt = Date.now();
      state.currentTargetErrors = 0;
      state.currentPageErrors = 0;
      pageImage.src = current.image;
      pageCounter.textContent = `Página ${current.page}/${pages.length}`;
      nextButton.disabled = false;
      nextButton.dataset.locked = isInteractive ? "true" : "false";
      nextButton.textContent = state.index === pages.length - 1 ? "Ver resultado" : (current.page === 1 ? "Comenzar" : "Siguiente");
      feedback.textContent = "";
      feedback.className = "feedback";
      feedback.style.visibility = isInteractive ? "visible" : "hidden";
      tray.classList.toggle("passive", !isInteractive);
      pageWrap.querySelectorAll(".placed-card").forEach((node) => node.remove());
      zones.forEach((zone) => zone.classList.remove("correct"));
      cards.forEach((card) => {
        card.classList.remove("used", "error", "dragging");
        card.removeAttribute("style");
      });
      updateStats();
      startTimerIfNeeded();
    }

    function updateStats() {
      scoreOk.textContent = state.ok;
      scoreBad.textContent = state.bad;
      scoreAttempts.textContent = state.attempts;
      const accuracy = state.attempts ? Math.round((state.ok / state.attempts) * 100) : 0;
      scoreAccuracy.textContent = `${accuracy}%`;
      scoreAvgResponse.textContent = formatSeconds(average(state.responseTimes));
      updateLiveTimers();
    }

    function showFeedback(message, type) {
      feedback.textContent = message;
      feedback.className = `feedback ${type}`;
    }

    function zoneAtPoint(clientX, clientY) {
      return zones.find((zone) => {
        if (state.solved[zone.dataset.zone]) return false;
        const rect = zone.getBoundingClientRect();
        const padX = Math.min(24, rect.width * 0.12);
        const padY = Math.min(24, rect.height * 0.08);
        return clientX >= rect.left - padX && clientX <= rect.right + padX && clientY >= rect.top - padY && clientY <= rect.bottom + padY;
      });
    }

    function placeCard(label, zone) {
      const zoneStyles = getComputedStyle(zone);
      const x = parseFloat(zoneStyles.getPropertyValue("--x"));
      const y = parseFloat(zoneStyles.getPropertyValue("--y"));
      const w = parseFloat(zoneStyles.getPropertyValue("--w"));
      const h = parseFloat(zoneStyles.getPropertyValue("--h"));
      const placedWidth = w * 0.72;
      const placedHeight = h * 0.22;
      const placedLeft = x + (w - placedWidth) / 2;
      const placedTop = y + Math.min(4.8, h * 0.13);
      const placed = document.createElement("div");
      placed.className = "placed-card";
      placed.textContent = label;
      placed.style.left = `${placedLeft}%`;
      placed.style.top = `${placedTop}%`;
      placed.style.width = `${placedWidth}%`;
      placed.style.height = `${placedHeight}%`;
      pageWrap.appendChild(placed);
      zone.classList.add("correct");
    }

    function overlapArea(rectA, rectB) {
      const width = Math.max(0, Math.min(rectA.right, rectB.right) - Math.max(rectA.left, rectB.left));
      const height = Math.max(0, Math.min(rectA.bottom, rectB.bottom) - Math.max(rectA.top, rectB.top));
      return width * height;
    }

    function zoneForCard(card) {
      const cardRect = card.getBoundingClientRect();
      let bestZone = null;
      let bestOverlap = 0;

      zones.forEach((zone) => {
        if (state.solved[zone.dataset.zone]) return;
        const rect = zone.getBoundingClientRect();
        const expanded = {
          left: rect.left - Math.min(26, rect.width * 0.1),
          top: rect.top - Math.min(20, rect.height * 0.06),
          right: rect.right + Math.min(26, rect.width * 0.1),
          bottom: rect.bottom + Math.min(20, rect.height * 0.06)
        };
        const overlap = overlapArea(cardRect, expanded);
        if (overlap > bestOverlap) {
          bestOverlap = overlap;
          bestZone = zone;
        }
      });

      return bestOverlap > 0 ? bestZone : null;
    }

    function finalizeInteractivePage() {
      const current = pages[state.index];
      if (!current?.answers) return;
      const pageTime = Date.now() - state.pageStartedAt;
      state.pageTimes.push(pageTime);
      state.pageSummaries.push({
        page: current.page,
        errors: state.currentPageErrors,
        durationMs: pageTime
      });
    }

    function allSolved() {
      return zones.every((zone) => state.solved[zone.dataset.zone]);
    }

    function handleDrop(card, zone) {
      const current = pages[state.index];
      if (!current.answers) return;

      if (!zone) {
        resetDraggedCard(card);
        return;
      }

      state.attempts += 1;
      const zoneName = zone.dataset.zone;
      const label = normalize(card.dataset.card);
      const expected = normalize(current.answers[zoneName]);

      if (label === expected) {
        state.ok += 1;
        const responseMs = Date.now() - state.targetStartedAt;
        state.responseTimes.push(responseMs);
        if (state.currentTargetErrors === 0) state.firstTryHits += 1;
        state.currentTargetErrors = 0;
        resetDraggedCard(card);
        state.solved[zoneName] = true;
        card.classList.add("used");
        placeCard(card.dataset.card, zone);
        showFeedback("Acierto", "ok");
        if (allSolved()) {
          nextButton.dataset.locked = "false";
          finalizeInteractivePage();
        } else {
          state.targetStartedAt = Date.now();
        }
      } else {
        state.bad += 1;
        state.currentTargetErrors += 1;
        state.currentPageErrors += 1;
        card.classList.add("error");
        showFeedback("Error", "bad");
        window.setTimeout(() => card.classList.remove("error"), 450);
        resetDraggedCard(card);
      }

      updateStats();
    }

    function resetDraggedCard(card) {
      card.classList.remove("dragging");
      card.style.removeProperty("--drag-width");
      card.style.removeProperty("--drag-height");
      card.style.left = "";
      card.style.top = "";
      card.style.transform = "";
    }

    function beginDrag(event, card) {
      if (card.classList.contains("used")) return;
      event.preventDefault();

      const rect = card.getBoundingClientRect();
      state.drag = {
        card,
        pointerId: event.pointerId,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top
      };

      card.setPointerCapture(event.pointerId);
      card.style.setProperty("--drag-width", `${rect.width}px`);
      card.style.setProperty("--drag-height", `${rect.height}px`);
      card.classList.add("dragging");
      moveDrag(event);
    }

    function moveDrag(event) {
      if (!state.drag || event.pointerId !== state.drag.pointerId) return;
      const { card, offsetX, offsetY } = state.drag;
      card.style.left = `${event.clientX - offsetX}px`;
      card.style.top = `${event.clientY - offsetY}px`;
    }

    function endDrag(event) {
      if (!state.drag || event.pointerId !== state.drag.pointerId) return;
      const { card } = state.drag;
      state.drag = null;
      card.releasePointerCapture(event.pointerId);
      const zone = zoneForCard(card) || zoneAtPoint(event.clientX, event.clientY);
      handleDrop(card, zone);
    }

    function nextPage() {
      const current = pages[state.index];
      if (current?.answers && !allSolved()) {
        showFeedback("Completa los dos recuadros", "bad");
        return;
      }
      if (state.index === pages.length - 1) {
        showFinal();
        return;
      }
      state.index += 1;
      renderPage();
    }

    function formatTime(ms) {
      const seconds = Math.max(0, Math.floor(ms / 1000));
      const minutes = Math.floor(seconds / 60);
      const rest = String(seconds % 60).padStart(2, "0");
      return `${minutes}:${rest}`;
    }

    function showFinal() {
      clearTimer();
      activity.classList.add("hidden");
      finalScreen.classList.add("active");
      const percent = interactiveTargetCount === 0 ? 0 : Math.round((state.ok / interactiveTargetCount) * 100);
      const firstTry = interactiveTargetCount === 0 ? 0 : Math.round((state.firstTryHits / interactiveTargetCount) * 100);
      const avgResponse = average(state.responseTimes);
      const avgPage = average(state.pageTimes);
      const errorLoad = interactiveTargetCount === 0 ? 0 : state.bad / interactiveTargetCount;
      document.getElementById("finalOk").textContent = state.ok;
      document.getElementById("finalBad").textContent = state.bad;
      document.getElementById("finalPercent").textContent = `${percent}%`;
      document.getElementById("finalTime").textContent = formatTime(Date.now() - state.startTime);
      document.getElementById("finalAvgResponse").textContent = formatSeconds(avgResponse);
      document.getElementById("finalFirstTry").textContent = `${firstTry}%`;
      document.getElementById("finalErrorLoad").textContent = errorLoad.toFixed(1);
      document.getElementById("finalAvgPage").textContent = formatSeconds(avgPage);
      try {
        localStorage.setItem("teacch_lleno_vacio_last_session", JSON.stringify({
          savedAt: new Date().toISOString(),
          score: percent,
          hits: state.ok,
          errors: state.bad,
          attempts: state.attempts,
          firstTryAccuracy: firstTry,
          averageResponseMs: Math.round(avgResponse),
          averagePageMs: Math.round(avgPage),
          errorLoad: Number(errorLoad.toFixed(1)),
          pageSummaries: state.pageSummaries
        }));
      } catch (error) {
        console.warn("No se pudo guardar la medicion local", error);
      }
    }

    function restart() {
      clearTimer();
      state.index = 0;
      state.ok = 0;
      state.bad = 0;
      state.attempts = 0;
      state.startTime = Date.now();
      state.responseTimes = [];
      state.pageTimes = [];
      state.pageSummaries = [];
      state.firstTryHits = 0;
      state.drag = null;
      activity.classList.remove("hidden");
      finalScreen.classList.remove("active");
      renderPage();
    }

    cards.forEach((card) => {
      card.addEventListener("pointerdown", (event) => beginDrag(event, card));
      card.addEventListener("pointermove", moveDrag);
      card.addEventListener("pointerup", endDrag);
      card.addEventListener("pointercancel", endDrag);
      card.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        const current = pages[state.index];
        const openZone = zones.find((zone) => !state.solved[zone.dataset.zone] && current?.answers && normalize(current.answers[zone.dataset.zone]) === normalize(card.dataset.card))
          || zones.find((zone) => !state.solved[zone.dataset.zone]);
        if (!openZone) return;
        handleDrop(card, openZone);
      });
    });

    nextButton.addEventListener("click", nextPage);
    restartButton.addEventListener("click", restart);

    renderPage();
  </script>
</body>
</html>
